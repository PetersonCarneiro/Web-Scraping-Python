name: Renovar Token EQS

on:
  schedule:
    # Roda todo dia útil às 7h horário de Brasília (10h UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # Permite rodar manualmente também

jobs:
  renovar-token:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Google Chrome e ChromeDriver
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          # Instala o chromedriver compatível com a versão do Chrome
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          wget -q "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_VERSION%%.*}" -O /tmp/chromedriver_version
          DRIVER_VERSION=$(cat /tmp/chromedriver_version)
          wget -q "https://chromedriver.storage.googleapis.com/${DRIVER_VERSION}/chromedriver_linux64.zip"
          unzip -q chromedriver_linux64.zip
          sudo mv chromedriver /usr/bin/chromedriver
          sudo chmod +x /usr/bin/chromedriver
          echo "✔ Chrome e ChromeDriver instalados"
          google-chrome --version
          chromedriver --version

      - name: Rodar script de renovação
        env:
          EQS_LOGIN: ${{ secrets.EQS_LOGIN }}
          EQS_PASSWORD: ${{ secrets.EQS_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python renovar_token.py

      - name: Notificar falha
        if: failure()
        run: echo "❌ Falha na renovação do token! Verifique os logs acima."
