name: Renovar Token EQS

on:
  schedule:
    # Roda todo dia útil às 7h horário de Brasília (10h UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  renovar-token:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Instalar Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Exibir versões do ambiente
        run: |
          python --version
          pip --version
          google-chrome --version
          xvfb-run --help >/dev/null

      - name: Rodar script de renovação
        env:
          EQS_LOGIN: ${{ secrets.EQS_LOGIN }}
          EQS_PASSWORD: ${{ secrets.EQS_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          EQS_HEADLESS: 'false'
        run: xvfb-run -a python renovar_token.py

      - name: Publicar artefatos de diagnóstico
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-renovar-token
          path: |
            falha_tentativa_*.png
            falha_tentativa_*.html
          if-no-files-found: ignore

      - name: Notificar falha
        if: failure()
        run: echo "❌ Falha na renovação do token! Verifique os logs acima."
